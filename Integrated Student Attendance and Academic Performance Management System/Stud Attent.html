<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arunachala Hi-Tech Engineering College — Attendance 3D (Final)</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>

</head>
<body>
  <canvas id="bgCanvas" aria-hidden="true"></canvas>

  <!-- Futuristic Navbar -->
  <nav class="w-full fixed top-0 left-0 z-30">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="brand flex items-center gap-3">
        <div style="width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-primary-2));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,0.2);">
        <img src="https://www.arunachalahitechcollege.com/assets/images/HiTech_Logo.png" alt="logo" style="width:32px;height:32px;">
        </div>
        <div>
          <div class="neon-text" style="font-weight:700;font-size:1.05rem;">Arunachala Hi-Tech Engineering College</div>
          <div style="font-size:0.8rem;color:var(--text-secondary)">Student Attendance System</div>
        </div>
      </div>

      <div class="links" id="navLinks">
        <a href="#attendance">Attendance</a>
        <a href="#reports">Reports</a>
        <a href="#students">Students</a>
      </div>
      <button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Toggle menu" aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto container px-6" style="padding-top:110px; padding-bottom:60px; position:relative; z-index:1;">
    <div id="appRoot" class="grid place-items-center"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
